site_name: Jim Raynor Blog
site_url: https://jim88.pp.ua
repo_url: https://github.com/jimraynor88/jimraynor88.github.io
repo_name: GitHub
edit_uri: ""

theme:
  name: material        # Tema material
  custom_dir: overrides
  palette:
    scheme: slate       # Modo oscuro
#  custom_dir: theme     # Carpeta con CSS personalizado
  highlightjs: true

#extra_css:
 # - theme/assets/css/style.scss  # Tu CSS personalizado para dark mode

plugins:
  - search
  - awesome-pages          # Navegación automática
  - section-index          # Índices de secciones
  - blog:
      blog_dir: blog
      blog_toc: true
      post_dir: "{blog}/articles"
      post_date_format: full
      post_url_format: "{categories}/{date}"
      post_readtime_words_per_minute: 218
      archive: true
      archive_name: Histórico
      archive_date_format: yyyy
      archive_url_format: "archive/{date}"
      archive_pagination: true
      archive_pagination_per_page: 6
      archive_toc: true
      categories: true
      categories_name: Temas
      categories_url_format: "category/{slug}"
      categories_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      categories_slugify_separator: _
      categories_sort_by: !!python/name:material.plugins.blog.view_post_count
      categories_pagination: true
      categories_pagination_per_page: 6
      categories_toc: true
      pagination: true
      pagination_per_page: 6
      pagination_url_format: "pag./{page}"
      draft: true
      draft_if_future_date: true
  - rss:                   # Plugin RSS
  extra:
    social:
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/invito
      name: Invitas al Ko-Fi?
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.superfences
  - tables
  - attr_list
