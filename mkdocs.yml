site_name: Jim Raynor's site
site_url: https://jim88.pp.ua
repo_url: https://github.com/jimraynor88/jimraynor88.github.io
repo_name: GitHub
edit_uri: ""

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
  highlightjs: true

extra_css:
  - assets/stylesheets/kofi.css

plugins:
  - search
  - awesome-pages
  - section-index
  - rss

extra:
  social:
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/invito
      name: Invítame al Ko-Fi

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.superfences
  - tables
  - attr_list
