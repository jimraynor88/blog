site_name: Jim Raynor's site
site_url: https://jim88.pp.ua
#repo_url: https://github.com/jimraynor88/jimraynor88.github.io
#repo_name: GitHub
#edit_uri: ""
repo_url: https://ko-fi.com/invito
repo_name: Invítame al Ko-Fi

theme:
  name: material
  custom_dir: overrides
  palette:
  # Modo claro
  - scheme: default
    primary: indigo
    accent: deep orange
    toggle:
      icon: material/brightness-7      # Icono de sol
      name: Cambiar a modo oscuro      # Texto al pasar el ratón
  # Modo oscuro
  - scheme: slate
    primary: indigo
    accent: deep orange
    toggle:
      icon: material/brightness-4      # Icono de luna
      name: Cambiar a modo claro
  icon:
    repo: fontawesome/solid/mug-hot
  favicon: assets/favicon.ico   # <--- añade esto
  logo: assets/logo.jpg
  highlightjs: true
  features:
    - navigation.footer   # 👈 Esto activa los enlaces de página siguiente/anterior
    - navigation.tabs        # pestañas en el header
    - navigation.sections    # secciones expandibles en la barra lateral

extra_css:
  - assets/stylesheets/kofi.css
plugins:
  - search
  - awesome-pages
  - section-index
  - rss:
      match:
        - "blog/posts/**/*.md"
      date_from_meta:
        pubDate: date      # 'pubDate' es el campo en el feed, 'date' es tu campo YAML
      title_from_meta:
        title: title
      # description_from_meta:   # opcional
      #   description: description
      # feed_title: "Jim Raynor's Blog"
      # feed_description: "Artículos sobre filosofía, economía y astrología"
  - bettertags
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - glightbox
  - minify
  - macros
  - mkdocs-video
  #- git-committers:
  #    repository: jimraynor88/jimraynor88.github.io
  #    token: !ENV GITHUB_TOKEN   # Usa el token automático de GitHub Actions

copyright: "Hecho con 💙 por Jim Raynor - 2026"   # texto que aparecerá en el footer
extra:
  author: Jim Raynor
  year: 2026
  generator: false               # sigue siendo necesario
 # revision: true   # no es una opción estándar, mejor usar el plugin directamente
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jimraynor88
      name: GitHub
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/jimraynor1488
      name: X
    - icon: fontawesome/solid/envelope
      link: mailto:jimraynor@duck.com
      name: Email
    - icon: fontawesome/brands/telegram
      link: https://t.me/jimraynorbot
      name: Telegram
    - icon: fontawesome/solid/sitemap
      link: /sitemap.xml
      name: Mapa del sitio
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/invito
      name: Invítame al Ko-Fi

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.superfences
  - tables
  - attr_list

extra_javascript:
  - https://storage.ko-fi.com/cdn/widget/Widget_2.js
  - js/kofi_button.js

nav:
  - Inicio: index.md
  - Blog: blog/index.html   # El plugin genera automáticamente esta página
  # ... otras secciones fijas
