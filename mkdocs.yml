#repo_name: GitHub
#edit_uri: ""
repo_url: https://ko-fi.com/summary/0fb45a0d-39eb-4147-bf83-c3e87b4085d7
repo_name: Invítame al Ko-Fi

theme:
  name: material
  language: es
  
  custom_dir: overrides
  palette:
  # Modo claro
  - scheme: default
    primary: indigo
    accent: blue
    toggle:
      icon: material/brightness-4      # Icono de sol
      name: Cambiar a modo oscuro      # Texto al pasar el ratón
  # Modo oscuro
  - scheme: slate
    primary: blue
    accent: indigo
    toggle:
      icon: material/brightness-7     # Icono de luna
      name: Cambiar a modo claro
  icon:
    repo: fontawesome/solid/mug-hot
  favicon: assets/favicon.ico   # <--- añade esto
  logo: assets/logo.jpg
  highlightjs: true
  features:
    - navigation.tabs        # pestañas en el header
    - navigation.sections    # secciones expandibles en la barra lateral
    - navigation.tabs.sticky   # mantiene las pestañas visibles al hacer scroll.
    - navigation.indexes # usa los index.md como índices de sección (en lugar de enlazar a la primera subpágina).
    - navigation.prune # elimina las secciones vacías del menú lateral.
    - navigation.top #  añade un botón para volver arriba.
    #- header.autohide # oculta el encabezado al hacer scroll hacia abajo y lo muestra al subir.
    - search.highlight # resalta los términos de búsqueda en los resultados.
    - search.suggest # activa autocompletado en la barra de búsqueda.
    - search.share # permite compartir enlaces de búsqueda.
    - search.term.highlight   # Resalta los términos de búsqueda dentro del contenido de la página
    - content.code.copy # añade un botón para copiar fragmentos de código.
    - content.code.select     # Permite seleccionar y copiar solo partes de bloques de código
    - content.code.scroll     # Hace que los bloques de código largos tengan scroll horizontal
    - content.code.line-numbers # Muestra números de línea en los bloques de código
    - content.code.annotate # permite anotar líneas de código (con iconos, etc.).
    - content.tabs.link       # Vincula pestañas de contenido entre sí para que persistan al cambiar de página
    - content.tooltips        # Muestra tooltips al pasar el cursor sobre enlaces de cabecera
    - content.footnote.tooltips # Muestra tooltips para notas al pie
    - navigation.instant       # Hace que la navegación entre páginas sea instantánea (carga con AJAX)
    - navigation.path         # Muestra la ruta de navegación (breadcrumbs) en la parte superior
    - navigation.tracking     # Actualiza la URL con el título de la página al navegar (para instant)
    #- navigation.expand


extra_css:
  - assets/stylesheets/kofi.css
  
plugins:
  - search
  - ezlinks
  - encryptcontent:
      password_file: 'passwords.yml'
      webcrypto: true          # usa la API nativa del navegador (más rápida que crypto-js)
      kdf_pow: 2               # reduce la dificultad (por defecto era 4 o 5). 3 es un buen equilibrio
      remember_keys: true      # guarda las claves derivadas en sessionStorage para no recalcular en cada página
      remember_password: false # no guardar la contraseña en texto, solo la clave derivada
      password_button: True
      password_button_text: 'Desbloquear'
      placeholder: 'Contraseña'
      placeholder_user: 'Usuario'
      summary: '⚠️ Esta página está protegida.'
      decryption_failure_message: '❌ Credenciales incorrectas. Si el problema persiste, recarga la página e inténtalo de nuevo.'
      encryption_info_message: '🔒 Necesitas credenciales para ver este contenido.'
#      inject:
 #       main: [main, tag]
      encrypted_something:
        main: [main, tag]
#  - encryptcontent:
 #     password_file: 'passwords.yml'   # Carga las contraseñas desde este archivo externo
  #    webcrypto: false
   #   password_button: True
    #  password_button_text: 'Desbloquear'
     # placeholder: 'Introduce la contraseña'
      #placeholder_user: 'Usuario (opcional)'  # Si usas usuario/contraseña
     # summary: '⚠️ Esta página está protegida.'
    #  decryption_failure_message: '❌ Credenciales incorrectas.'
   #   encryption_info_message: '🔒 Necesitas credenciales para ver este contenido.'
  #    remember_password: False
 #     search_index: 'encrypted'

  #- roamlinks_extra
  - awesome-pages
  - section-index
  - categories
  - rss:
      match_path: "blog/posts/.*"   # ← así se filtran los posts (regex)
      date_from_meta:
        as_creation: date           # ← usa el campo 'date' del frontmatter
        as_update: false            # ← no usa fecha de actualización
      length: 20                    # número de posts en el feed
      abstract_chars_count: 160     # longitud del resumen
  #- bettertags
  #- document-dates:
   #   show_author: true
    #  date_format: '%A, %d de %B de %Y'
     # position: top
