site_name: Jim Raynor Blog
site_url: https://jim88.pp.ua
repo_url: https://github.com/jimraynor88/jimraynor88.github.io
repo_name: GitHub
edit_uri: ""

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
  highlightjs: true

plugins:
  - search
  - awesome-pages
  - section-index
  - rss:
      feed_title: "Jim Raynor Blog RSS"
      feed_link: "https://jim88.pp.ua/feed_rss.xml"
      feed_description: "Últimos posts del blog"
      max_entries: 20

extra:
  social:
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/invito
      name: Invítame al Ko-Fi

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.superfences
  - tables
  - attr_list
