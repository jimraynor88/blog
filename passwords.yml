# passwords.yml
# Nivel con una sola contraseña (string)
#basico: 'clave-basica'
#vip: 'clave-vip'
admin:
  jim: !ENV [LEVEL_ADMIN, '']
astro: !ENV [LEVEL_ASTRO, '']
astrotarot: !ENV [LEVEL_ASTROTAROT, '']
invitados:
  user1: !ENV [LEVEL_INVITADOS_USER1, '']
  user2: !ENV [LEVEL_INVITADOS_USER2, '']
  user3: !ENV [LEVEL_INVITADOS_USER3, '']
  
# Nivel vacío (no protege, útil para desactivar temporalmente)
# desactivado: ''

# ============================================================
# 2. EJEMPLOS DE FRONTMATTER (para copiar en tus archivos .md)
# --- Ejemplo 1: Protección con contraseña directa (sin nivel) ---

# ---
# title: Página secreta
# password: "miclave"
# ---

# --- Ejemplo 2: Protección con un nivel definido arriba (por ejemplo 'basico') ---
# --- Solo se necesita la contraseña ---

# ---
# title: Documento interno
# level: basico
# ---

# --- Ejemplo 3: Protección con nivel que tiene lista de contraseñas (ej. 'astro_basico') ---

# ---
# title: Astrología básica
# level: astro_basico
# ---

# --- Ejemplo 4: Protección con nivel que requiere usuario y contraseña (ej. 'usuarios') ---
# --- El formulario mostrará campos para usuario y contraseña ---

# ---
# title: Área restringida
# level: usuarios
# ---

# --- Ejemplo 5: Protección con múltiples niveles (cualquiera de ellos da acceso) ---

# ---
# title: Documento multinivel
# level:
#   - basico
#   - vip
# ---

# --- Ejemplo 6: Combinación de contraseña directa y nivel (no es posible; prevalece el más específico) ---
# --- Si usas 'password' y 'level' juntos, 'password' tiene prioridad ---

# --- Ejemplo 7: Deshabilitar protección global en una página concreta ---
# --- (si tienes global_password o _global, pon level: "" o password: "") ---

# ---
# title: Página pública
# level: ""
# ---

# ============================================================
# 3. NOTA SOBRE VARIABLES DE ENTORNO

# Puedes usar !ENV para leer valores desde el entorno (ej. secrets de GitHub Actions)
# Ejemplo:
# secreto: !ENV PASSWORD_SECRETO
# Luego en el workflow: env: PASSWORD_SECRETO: ${{ secrets.PASSWORD_SECRETO }}
