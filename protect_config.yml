# protect_config.yml
protections:
  - folder: "docs/acerca_mia/astrologia"
    level: "astro"
    enabled: true
    exclude:
      - "index.md"               # Excluye solo index.md dentro de esa carpeta
      #- "README.md"
      # - "subcarpeta/otro.md"   # También puedes usar rutas relativas a la carpeta

  - folder: "docs/acerca_mia/astrologia/carta_natal/casas/"
    level: "astro"
    enabled: true
    exclude: []
      #- "**/borrador.md"        # Excluye cualquier archivo llamado borrador.md en cualquier subcarpeta
      #- "Casa_12.md"            # Excluye este archivo específico

  - folder: "docs/Blog/posts/2026"
    level: "archivo"
    enabled: false
    exclude:
      - "*.bkp.md"              # Usa patrones simples (asterisco) si quieres (opcional, podemos implementar)

  # Puedes desactivar temporalmente una regla sin borrarla:
  # - folder: "docs/Otros"
  #   level: "prueba"
  #   enabled: false
